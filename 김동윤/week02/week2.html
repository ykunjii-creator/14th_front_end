<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntroduceMySelf</title>
    <link rel="stylesheet" href="week2.css" />
  </head>
  <body>
    <div class="top-frame">
      <div class="bento">
        <div class="base-card">
          <p class="font2">김동윤(25)</p>
          <p class="font">응용소프트웨어전공 22학번</p>
          <p class="font font-sm">Full-Stack</p>
        </div>
        <div class="music-card">
          <p class="font-sm">Music(재생기능 실패🥲)</p>
          <div class="music-content">
            <img src="media/album-art.png" alt="앨범사진" class="album-art">
            
            <div class="music-info">
              <p class="font-music-title">Natsune</p>
              <p class="font-music-artist">夏音</p>
            </div>
          </div>
        </div>
        <div class="skill-card">
          <p class="font-sm">Skills</p>
          <div class="skill-box">
            <span class="skill-chips font-skill">Java</span>
          </div>
        </div>
        <div class="introduce-card">
          <p class="font-sm">Introduce</p>
          <div class="intruduce-box">
            <p class="font-introduce">
              안녕하세요. Full Stack 아기사자로 활동중인 김동윤입니다. <br>
            </p>
            <p class="font-introduce">
              26년도에 응용소프트웨전공으로 전과했습니다!
            </p>
            <p class="font-introduce">
               취미는 운동이랑 친구들하고 게임하는거고 운동은 주로 헬스를 하고 있습니다! <br> 이번 1년동안 잘 부탁드립니다!
            </p>
          </div>
        </div>
        <div class="link-card">
          <p class="font-sm">Links</p>
          <div class="link-box">
            <a href="https://github.com/safestone" target="_blank"
              ><img
                src="media/github-icon.png"
                width="100px"
                height="100px"
                alt="깃허브"
            /></a>
            <a href="https://www.instagram.com/safestone02/" target="_blank"
              ><img
                src="media/instagram-icon.png"
                width="100px"
                height="100px"
                alt="인스타"
            /></a>
            <a href="https://discord.gg/7j8VDvUA" target="_blank">
              <img src="media/discord-icon.ico" width="100px" height="100px" alt="디스코드">
            </a>
          </div>
        </div>
        <div class="game-card">
          <p class="font-sm">Games</p>
          <div class="game-box">
            <div class="game-chips"><img src="media/lol-icon.jpg" alt="롤" width="90"></div>
            <div class="game-chips"><img src="media/overwatch-icon.jpg" alt="옵치" width="90"></div>
            <div class="game-chips"><img src="media/lostark-icon.jpg" alt="로아" width="90" height="135"></div>
            <div class="game-chips"><img src="media/pubg-icon.jpg" alt="배그" width="90"></div>
            <div class="game-chips"><img src="media/apex-icon.jpg" alt="하데스2" width="90"></div>
            <div class="font2">●●●</div>
          </div>   
        </div>
      </div>
    </div>
  </body>
</html>
